<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Projet — Assistant IA</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#ecedef;min-height:100vh}
    .wrap{max-width:960px;margin:0 auto;padding:28px 20px}

    /* Header */
    .detail-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
    .btn-back{padding:9px 15px;background:white;color:#333;border:1.5px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;flex-shrink:0;font-weight:500}
    .btn-back:hover{background:#f0f0f0}
    .header-title{flex:1;min-width:0}
    .header-title h1{font-size:20px;font-weight:700;color:#111;word-break:break-word}
    .header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
    .btn-notion{padding:8px 14px;background:white;color:#333;border:1.5px solid #ccc;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;font-weight:500}
    .btn-notion:hover{background:#f0f0f0}
    .btn-sync{padding:8px 14px;background:#111;color:white;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
    .btn-sync:hover{background:#333}
    .btn-sync:disabled{background:#bbb;cursor:not-allowed}

    /* Info cards */
    .info-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
    .info-card{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #d0d0d0}
    .info-card-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .info-card-value{font-size:14px;font-weight:600;color:#111;word-break:break-word}

    /* Progress section */
    .progress-card{background:white;border-radius:12px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #d0d0d0;margin-bottom:20px}
    .progress-card h2{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
    .progress-bar-wrap{display:flex;align-items:center;gap:14px;margin-bottom:16px}
    .progress-track{flex:1;height:7px;background:#ddd;border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:#111;border-radius:4px;transition:width .4s}
    .progress-pct{font-size:14px;font-weight:700;color:#111;white-space:nowrap;min-width:36px;text-align:right}
    .phases{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .phase-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid #ccc;border-radius:9px;background:#fafafa;cursor:pointer;transition:background .1s}
    .phase-item:hover{background:#efefef}
    .phase-item.checked{background:#f0fdf4;border-color:#86efac}
    .phase-check{width:17px;height:17px;border-radius:4px;border:2px solid #bbb;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;background:white;transition:all .15s}
    .phase-item.checked .phase-check{background:#111;border-color:#111;color:white}
    .phase-label{font-size:13px;font-weight:500;color:#333}
    .phase-item.checked .phase-label{color:#166534;font-weight:600}

    /* Tabs */
    .tabs-section{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #d0d0d0;margin-bottom:20px;overflow:hidden}
    .tabs-nav{display:flex;border-bottom:2px solid #d8d8d8;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .tabs-nav::-webkit-scrollbar{display:none}
    .tab-btn{padding:12px 18px;font-size:12px;font-weight:600;color:#666;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-2px;flex-shrink:0}
    .tab-btn:hover{color:#222;background:#fafafa}
    .tab-btn.active{color:#111;border-bottom-color:#111;background:#fff}
    .tab-content{display:none;padding:20px 24px}
    .tab-content.active{display:block}
    .tab-text{font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto}
    .tab-empty{font-size:13px;color:#888;padding:20px 0}
    .notion-hint{font-size:12px;color:#555;background:#f3f3f3;border:1px solid #d0d0d0;border-radius:8px;padding:10px 14px;margin-top:12px}

    /* Chat */
    .chat-section{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #d0d0d0;overflow:hidden;margin-bottom:8px}
    .chat-header{padding:14px 20px;border-bottom:1.5px solid #d0d0d0;background:#fafafa}
    .chat-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
    .chat-messages{padding:16px 20px;display:flex;flex-direction:column;gap:12px;min-height:80px;max-height:340px;overflow-y:auto}
    .msg{display:flex;flex-direction:column;gap:3px;max-width:88%}
    .msg.user{align-self:flex-end;align-items:flex-end}
    .msg.assistant{align-self:flex-start}
    .bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .msg.user .bubble{background:#111;color:white;border-bottom-right-radius:4px}
    .msg.assistant .bubble{background:#e8e8e8;color:#111;border-bottom-left-radius:4px}
    .agent-tag{font-size:11px;color:#666;padding:0 4px}
    .chat-input{display:flex;gap:10px;padding:14px 20px;border-top:1.5px solid #d0d0d0}
    .chat-input input{flex:1;padding:10px 14px;border:1.5px solid #ccc;border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:#fafafa}
    .chat-input input:focus{border-color:#111;background:white}
    .chat-input button{padding:10px 20px;background:#111;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer;white-space:nowrap}
    .chat-input button:hover{background:#333}
    .chat-input button:disabled{background:#bbb;cursor:not-allowed}
    .typing{color:#777;font-size:12px;padding:4px 0}
    .sync-result{font-size:12px;color:#166534;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 12px;margin-top:6px}

    /* Utils */
    .loading{text-align:center;padding:60px;color:#888}

    /* Bib modal */
    .modal-scroll{overflow-y:auto;padding:2px 0;flex:1;display:flex;flex-direction:column;gap:12px}
    .modal-ftr{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:14px}
    .bib-field{display:flex;flex-direction:column;gap:5px}
    .bib-field label{font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.04em}
    .bib-inp{width:100%;padding:8px 12px;border:1.5px solid #ccc;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white;transition:border .15s}
    .bib-inp:focus{border-color:#111}
    textarea.bib-inp{resize:vertical}
    select.bib-inp{cursor:pointer}
    .bib-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* Email tab */
    .email-tab-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .btn-sm-outline{padding:6px 12px;background:white;color:#333;border:1.5px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;font-weight:500}
    .btn-sm-outline:hover{background:#f0f0f0}
    .email-list{max-height:300px;overflow-y:auto;border:1.5px solid #d0d0d0;border-radius:10px;margin-bottom:14px}
    .email-item{border-bottom:1px solid #e8e8e8;cursor:pointer;transition:background .1s}
    .email-item:last-child{border-bottom:none}
    .email-item:hover .email-item-row{background:#fafafa}
    .email-item-row{display:flex;align-items:center;gap:10px;padding:10px 14px}
    .email-badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap}
    .badge-envoye{background:#dcfce7;color:#166534}
    .badge-brouillon{background:#fef3c7;color:#92400e}
    .badge-recu{background:#dbeafe;color:#1e40af}
    .email-item-subj{font-size:13px;font-weight:600;color:#111;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .email-item-date{font-size:11px;color:#888;flex-shrink:0}
    .email-item-preview{font-size:12px;color:#666;padding:0 14px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .email-item-body{display:none;padding:12px 14px;background:#f8f8f8;border-top:1px solid #e8e8e8;font-size:13px;color:#333;white-space:pre-wrap;line-height:1.6;word-break:break-word}
    .email-item.open .email-item-body{display:block}
    .email-compose{border:1.5px solid #d0d0d0;border-radius:10px;padding:16px;background:#fafafa;margin-top:4px}
    .email-compose h3{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
    .compose-field{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .compose-lbl{font-size:12px;font-weight:600;color:#555;width:64px;flex-shrink:0;text-align:right}
    .compose-inp{flex:1;padding:8px 12px;border:1.5px solid #ccc;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white;transition:border .15s}
    .compose-inp:focus{border-color:#111}
    textarea.compose-inp{resize:vertical}
    .compose-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;padding-left:74px}
    .btn-compose-ia{padding:8px 14px;background:white;color:#333;border:1.5px solid #ccc;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
    .btn-compose-ia:hover{background:#f0f0f0}
    .btn-compose-ia:disabled{opacity:.5;cursor:not-allowed}
    .btn-compose-draft{padding:8px 14px;background:white;color:#333;border:1.5px solid #ccc;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
    .btn-compose-draft:hover{background:#f0f0f0}
    .btn-compose-send{padding:8px 18px;background:#111;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
    .btn-compose-send:hover{background:#333}
    .btn-compose-send:disabled{background:#bbb;cursor:not-allowed}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:white;border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:14px;font-weight:700;color:#111}

    /* Mobile */
    @media(max-width:768px){
      .wrap{padding:16px 12px}
      .detail-header{gap:10px;margin-bottom:18px}
      .header-title h1{font-size:17px}
      .header-actions{flex:0 0 auto}
      .info-cards{grid-template-columns:repeat(2,1fr);gap:8px}
      .info-card{padding:12px 13px}
      .info-card-value{font-size:13px}
      .progress-card{padding:16px 18px}
      .phases{grid-template-columns:1fr 1fr}
      .tab-btn{padding:10px 14px;font-size:11px}
      .tab-content{padding:16px 18px}
      .chat-messages{max-height:240px}
      .chat-input{padding:12px 14px;gap:8px}
      .chat-input input{font-size:16px}
    }
    @media(max-width:480px){
      .detail-header{flex-wrap:wrap}
      .header-title{flex:1 1 100%;order:-1}
      .phases{grid-template-columns:1fr}
      .info-card-label{font-size:9px}
    }
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="loading">Chargement du projet…</div>
  </div>

  <script>
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

    const nomProjet = decodeURIComponent(window.location.pathname.replace(/^\/projet\//, ''))
    let projetData = null

    // ── Template onglet Specs avec bouton bibliothèque ───
    function specsTabHTML(text) {
      const body = text
        ? `<div class="tab-text">${esc(text)}</div>`
        : `<div class="tab-empty">Aucun contenu pour l'instant.</div>
           <div class="notion-hint">💡 Ce contenu est synchronisé dans Notion — utilise le bouton <strong>↑ Sync Notion</strong> pour le mettre à jour.</div>`
      return `
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
          <button class="btn-sm-outline" onclick="ouvrirModalBib()">💾 Sauvegarder en bibliothèque</button>
        </div>
        ${body}`
    }

    // ── Template statique de l'onglet email ───────────────
    function emailTabHTML() {
      const today = new Date().toISOString().slice(0, 10)
      return `
        <div class="email-tab-hdr">
          <span style="font-size:13px;font-weight:700;color:#333">💬 Communications</span>
          <button class="btn-sm-outline" onclick="ouvrirModalRecu()">+ Ajouter mail reçu</button>
        </div>
        <div id="emailList" class="email-list">
          <div style="color:#888;font-size:13px;padding:14px 16px">Chargement…</div>
        </div>
        <div class="email-compose">
          <h3>Rédiger un email</h3>
          <div class="compose-field">
            <span class="compose-lbl">À :</span>
            <input type="text" id="compDest" class="compose-inp" placeholder="email du client">
          </div>
          <div class="compose-field">
            <span class="compose-lbl">Sujet :</span>
            <input type="text" id="compSubj" class="compose-inp" placeholder="Objet de l'email">
          </div>
          <div class="compose-field" style="align-items:flex-start">
            <span class="compose-lbl" style="padding-top:9px">Message :</span>
            <textarea id="compBody" class="compose-inp" style="min-height:100px"></textarea>
          </div>
          <div class="compose-actions">
            <button class="btn-compose-ia" id="btnIA" onclick="redigerIA()">🤖 Rédiger avec l'IA</button>
            <button class="btn-compose-draft" onclick="sauvegarderBrouillon()">💾 Brouillon</button>
            <button class="btn-compose-send" id="btnSend" onclick="envoyerEmailCompose()">📧 Envoyer</button>
          </div>
          <div id="compStatus" style="font-size:12px;min-height:18px;margin-top:6px;padding-left:74px"></div>
        </div>
        <div id="modalRecu" class="modal-overlay" style="display:none" onclick="if(event.target===this)fermerModalRecu()">
          <div class="modal-box">
            <div class="modal-header">
              <span>📥 Ajouter un email reçu</span>
              <button onclick="fermerModalRecu()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#666;line-height:1">✕</button>
            </div>
            <div class="compose-field">
              <span class="compose-lbl">De :</span>
              <input type="text" id="rcvFrom" class="compose-inp" placeholder="expediteur@example.com">
            </div>
            <div class="compose-field">
              <span class="compose-lbl">Sujet :</span>
              <input type="text" id="rcvSubj" class="compose-inp">
            </div>
            <div class="compose-field" style="align-items:flex-start">
              <span class="compose-lbl" style="padding-top:9px">Message :</span>
              <textarea id="rcvBody" class="compose-inp" style="min-height:80px;resize:vertical"></textarea>
            </div>
            <div class="compose-field">
              <span class="compose-lbl">Date :</span>
              <input type="date" id="rcvDate" class="compose-inp" value="${today}">
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:8px">
              <div id="rcvStatus" style="font-size:12px"></div>
              <button class="btn-compose-send" onclick="sauvegarderRecu()">Ajouter</button>
            </div>
          </div>
        </div>`
    }

    // ── Charger et afficher le projet ─────────────────────
    async function charger() {
      try {
        const res  = await fetch('/projet-data/' + encodeURIComponent(nomProjet))
        projetData = await res.json()
        document.title = projetData.nom + ' — Assistant IA'
        render()
      } catch(e) {
        document.getElementById('app').innerHTML = `<div class="loading">Erreur : ${esc(e.message)}</div>`
      }
    }

    function render() {
      const p = projetData
      const m = p.meta || {}
      const c = p.content || {}

      const tabs = [
        { id:'brief',    label:'📋 Brief',           text: c.brief },
        { id:'specs',    label:'⚙️ Specs',            custom:'specs', text: c.specs },
        { id:'roadmap',  label:'🗺️ Roadmap',          text: c.roadmap },
        { id:'email',    label:'💬 Communications',   custom: 'email' },
        { id:'marketing',label:'📣 Marketing',        text: c.marketing },
        { id:'historique',label:'📝 Historique',      text: null },
      ]

      const np = v => (!v || v === '—') ? 'Non précisé' : v
      const infoCards = [
        { label:'Client',     value: np(m.client) },
        { label:'Budget',     value: np(m.budget) },
        { label:'Délai',      value: np(m.delai) },
        { label:'Livraison',  value: np(m.date_livraison) },
        { label:'Type',       value: m.type_extension ? m.type_extension.slice(0,40) : 'Non précisé' },
        { label:'Créé le',    value: p.date_creation || '—' },
      ]

      const phaseKeys = ['phase_1','phase_2','phase_3','phase_4']

      document.getElementById('app').innerHTML = `
        <!-- Header -->
        <div class="detail-header">
          <a href="/" class="btn-back">← Projets</a>
          <div class="header-title">
            <h1>🛍️ ${esc(p.nom)}</h1>
          </div>
          <div class="header-actions">
            <a href="/bibliotheque" class="btn-notion">📚 Bib</a>
            <button class="btn-notion" id="btnNotion" onclick="ouvrirNotion()">🔗 Notion</button>
            <button class="btn-sync" id="btnSync" onclick="syncNotion()">↑ Sync Notion</button>
          </div>
        </div>

        <!-- Info cards -->
        <div class="info-cards">
          ${infoCards.map(ic => `
            <div class="info-card">
              <div class="info-card-label">${esc(ic.label)}</div>
              <div class="info-card-value">${esc(ic.value)}</div>
            </div>`).join('')}
        </div>

        <!-- Progress + phases -->
        <div class="progress-card">
          <h2>Progression</h2>
          <div class="progress-bar-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="progFill" style="width:${p.progression}%"></div>
            </div>
            <div class="progress-pct" id="progPct">${p.progression}%</div>
          </div>
          <div class="phases">
            ${p.phase_labels.map((label, i) => {
              const key     = phaseKeys[i]
              const checked = p.phases[key] ? true : false
              return `
                <div class="phase-item${checked ? ' checked' : ''}" id="phase-${key}" onclick="togglePhase('${key}')">
                  <div class="phase-check">${checked ? '✓' : ''}</div>
                  <div class="phase-label">${esc(label)}</div>
                </div>`
            }).join('')}
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-section">
          <div class="tabs-nav">
            ${tabs.map((t,i) => `
              <button class="tab-btn${i===0?' active':''}" id="tabBtn-${t.id}" onclick="switchTab('${t.id}')">
                ${t.label}
              </button>`).join('')}
          </div>
          ${tabs.map((t,i) => `
            <div class="tab-content${i===0?' active':''}" id="tab-${t.id}">
              ${t.custom === 'email'
                ? emailTabHTML()
                : t.custom === 'specs'
                  ? specsTabHTML(t.text)
                  : t.text
                    ? `<div class="tab-text">${esc(t.text)}</div>`
                    : `<div class="tab-empty">Aucun contenu pour l'instant.</div>
                       <div class="notion-hint">💡 Ce contenu est synchronisé dans Notion — utilise le bouton <strong>↑ Sync Notion</strong> pour le mettre à jour.</div>`}
            </div>`).join('')}
        </div>

        <!-- Chat -->
        <div class="chat-section">
          <div class="chat-header">
            <h2>Chat — Contexte : ${esc(p.nom)}</h2>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Pose une question sur ce projet…"
                   onkeydown="if(event.key==='Enter') envoyer()">
            <button id="btnEnvoyer" onclick="envoyer()">Envoyer</button>
          </div>
        </div>

        <div id="syncResult"></div>

        <!-- Modal : Sauvegarder en bibliothèque -->
        <div id="modalBib" class="modal-overlay" style="display:none" onclick="if(event.target===this)fermerModalBib()">
          <div class="modal-box" style="max-width:580px;padding:0;display:flex;flex-direction:column;max-height:90vh">
            <div class="modal-header" style="padding:16px 22px;border-bottom:1.5px solid #e8e8e8;flex-shrink:0">
              <span>💾 Sauvegarder en bibliothèque</span>
              <button onclick="fermerModalBib()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#666">✕</button>
            </div>
            <div style="overflow-y:auto;padding:18px 22px;flex:1;display:flex;flex-direction:column;gap:12px">
              <div class="bib-row">
                <div class="bib-field">
                  <label>Nom du composant *</label>
                  <input type="text" id="bibNom" class="bib-inp">
                </div>
                <div class="bib-field">
                  <label>Catégorie</label>
                  <select id="bibCat" class="bib-inp">
                    <option value="inventory">inventory</option>
                    <option value="marketing">marketing</option>
                    <option value="ux" selected>ux</option>
                    <option value="checkout">checkout</option>
                    <option value="social-proof">social-proof</option>
                    <option value="navigation">navigation</option>
                  </select>
                </div>
              </div>
              <div class="bib-field">
                <label>Description</label>
                <input type="text" id="bibDesc" class="bib-inp" placeholder="Ce que fait le composant">
              </div>
              <div class="bib-field">
                <label>Tags (virgule)</label>
                <input type="text" id="bibTags" class="bib-inp" placeholder="badge, stock, urgence">
              </div>
              <div class="bib-field">
                <label>Code Liquid</label>
                <textarea id="bibLiquid" class="bib-inp" style="min-height:80px;font-family:monospace;font-size:12px"></textarea>
              </div>
              <div class="bib-field">
                <label>Code CSS</label>
                <textarea id="bibCss" class="bib-inp" style="min-height:60px;font-family:monospace;font-size:12px"></textarea>
              </div>
              <div class="bib-field">
                <label>Settings Schema</label>
                <textarea id="bibSchema" class="bib-inp" style="min-height:60px;font-family:monospace;font-size:12px"></textarea>
              </div>
              <div id="bibStatus" style="font-size:12px;min-height:16px"></div>
            </div>
            <div style="padding:14px 22px;border-top:1.5px solid #e8e8e8;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0">
              <button onclick="fermerModalBib()" style="padding:9px 18px;background:white;color:#333;border:1.5px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer">Annuler</button>
              <button id="btnBibSave" onclick="sauvegarderEnBib()" style="padding:9px 18px;background:#111;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">💾 Sauvegarder</button>
            </div>
          </div>
        </div>
      `

      // Stocker l'état des phases
      window._phases = {...p.phases}
    }

    // ── Tabs ──────────────────────────────────────────────
    function switchTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
      document.getElementById('tabBtn-' + id).classList.add('active')
      document.getElementById('tab-' + id).classList.add('active')
      if (id === 'email') chargerEmails()
    }

    // ── Phases ────────────────────────────────────────────
    async function togglePhase(key) {
      if (!window._phases) return
      const newVal = !window._phases[key]
      window._phases[key] = newVal

      const item  = document.getElementById('phase-' + key)
      const check = item.querySelector('.phase-check')
      const label = item.querySelector('.phase-label')
      item.classList.toggle('checked', newVal)
      check.textContent = newVal ? '✓' : ''

      // Update progress bar
      const total   = 4
      const checked = Object.values(window._phases).filter(Boolean).length
      const pct     = Math.round(checked / total * 100)
      document.getElementById('progFill').style.width = pct + '%'
      document.getElementById('progPct').textContent  = pct + '%'

      try {
        await fetch('/projet/' + encodeURIComponent(nomProjet) + '/phase', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ phase: key, checked: newVal })
        })
      } catch(e) { console.error(e) }
    }

    // ── Notion ────────────────────────────────────────────
    function ouvrirNotion() {
      window.open('https://www.notion.so', '_blank')
    }

    async function syncNotion() {
      const btn = document.getElementById('btnSync')
      btn.disabled = true; btn.textContent = '⏳ Sync…'
      try {
        const res  = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/notion-sync', {method:'POST'})
        const data = await res.json()
        const el   = document.getElementById('syncResult')
        el.innerHTML = `<div class="sync-result">✅ Synchronisé : ${esc((data.resultats||[]).join(' · '))}</div>`
        setTimeout(() => { el.innerHTML = '' }, 5000)
      } catch(e) {
        document.getElementById('syncResult').innerHTML = `<div class="sync-result" style="background:#fee2e2;color:#991b1b">❌ ${esc(e.message)}</div>`
      }
      btn.disabled = false; btn.textContent = '↑ Sync Notion'
    }

    // ── Chat ──────────────────────────────────────────────
    function addMsg(role, html, agent) {
      const box  = document.getElementById('chatMessages')
      const wrap = document.createElement('div')
      wrap.className = 'msg ' + role
      if (agent) {
        const tag = document.createElement('span')
        tag.className = 'agent-tag'; tag.textContent = 'Agent ' + agent
        wrap.appendChild(tag)
      }
      const bubble = document.createElement('div')
      bubble.className = 'bubble'; bubble.innerHTML = html
      wrap.appendChild(bubble)
      box.appendChild(wrap)
      box.scrollTop = box.scrollHeight
    }

    function addTyping() {
      const box = document.getElementById('chatMessages')
      const div = document.createElement('div')
      div.className = 'typing'; div.textContent = 'L\'assistant réfléchit…'
      box.appendChild(div); box.scrollTop = box.scrollHeight
      return div
    }

    async function envoyer() {
      const input = document.getElementById('chatInput')
      const btn   = document.getElementById('btnEnvoyer')
      const texte = input.value.trim()
      if (!texte) return
      addMsg('user', esc(texte), null)
      input.value = ''; btn.disabled = true
      const typing = addTyping()
      try {
        const res  = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: texte})
        })
        const data = await res.json()
        typing.remove()
        addMsg('assistant', esc(data.reponse || data.erreur || ''), data.agent)
      } catch(e) {
        typing.remove()
        addMsg('assistant', 'Erreur de connexion.', null)
      }
      btn.disabled = false; input.focus()
    }

    // ── Bibliothèque modal ────────────────────────────────
    function parseCodeSections(text) {
      const get = titre => {
        const m = (text||'').match(new RegExp(`##\\s*${titre}\\s*\\n([\\s\\S]*?)(?=\\n##|$)`, 'i'))
        if (!m) return ''
        return m[1].replace(/^```[\w]*\n?/gm,'').replace(/```\s*$/gm,'').trim()
      }
      return { liquid: get('CODE LIQUID'), css: get('CODE CSS'), schema: get('SETTINGS SCHEMA') }
    }

    function ouvrirModalBib() {
      const specs  = projetData?.content?.specs || ''
      const parsed = parseCodeSections(specs)
      const nomEl  = document.getElementById('bibNom')
      if (nomEl) nomEl.value = projetData?.nom || ''
      ;['bibDesc','bibTags','bibStatus'].forEach(id => { const el=document.getElementById(id); if(el) el.value!==undefined ? el.value='' : el.textContent='' })
      const liq = document.getElementById('bibLiquid'); if(liq) liq.value = parsed.liquid
      const css = document.getElementById('bibCss');    if(css) css.value = parsed.css
      const sch = document.getElementById('bibSchema'); if(sch) sch.value = parsed.schema
      const m   = document.getElementById('modalBib');  if(m)   m.style.display = 'flex'
    }

    function fermerModalBib() {
      const m = document.getElementById('modalBib'); if(m) m.style.display = 'none'
    }

    async function sauvegarderEnBib() {
      const nom    = (document.getElementById('bibNom')?.value||'').trim()
      const status = document.getElementById('bibStatus')
      const btn    = document.getElementById('btnBibSave')
      if (!nom) { status.textContent='⚠️ Le nom est requis'; status.style.color='#b45309'; return }
      const payload = {
        nom,
        categorie:       document.getElementById('bibCat')?.value||'ux',
        description:     (document.getElementById('bibDesc')?.value||'').trim(),
        tags:            (document.getElementById('bibTags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean),
        code_liquid:     (document.getElementById('bibLiquid')?.value||'').trim(),
        code_css:        (document.getElementById('bibCss')?.value||'').trim(),
        settings_schema: (document.getElementById('bibSchema')?.value||'').trim(),
        projet_origine:  projetData?.nom||'',
      }
      btn.disabled=true; btn.textContent='Sauvegarde…'; status.textContent=''
      try {
        const res = await fetch('/bibliotheque/ajouter', {
          method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
        })
        const d = await res.json()
        if (d.ok) {
          status.textContent='✅ Composant sauvegardé dans la bibliothèque !'; status.style.color='#166534'
          btn.textContent='✅ Sauvegardé'
          setTimeout(()=>fermerModalBib(), 1500)
        } else {
          status.textContent='❌ '+(d.erreur||'Erreur'); status.style.color='#b91c1c'
          btn.disabled=false; btn.textContent='💾 Sauvegarder'
        }
      } catch(e) {
        status.textContent='❌ '+e.message; status.style.color='#b91c1c'
        btn.disabled=false; btn.textContent='💾 Sauvegarder'
      }
    }

    // ── Email tab ─────────────────────────────────────────
    async function chargerEmails() {
      const list = document.getElementById('emailList')
      if (!list) return
      try {
        const res    = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/emails')
        const emails = await res.json()
        renderEmailList(emails)
      } catch(e) {
        const l = document.getElementById('emailList')
        if (l) l.innerHTML = `<div style="color:#b91c1c;font-size:13px;padding:14px 16px">Erreur : ${esc(e.message)}</div>`
      }
    }

    function renderEmailList(emails) {
      const list = document.getElementById('emailList')
      if (!list) return
      if (!emails || emails.length === 0) {
        list.innerHTML = '<div style="color:#888;font-size:13px;padding:14px 16px">Aucune communication pour l\'instant.</div>'
        return
      }
      const badgeCls = { envoye:'badge-envoye', brouillon:'badge-brouillon', recu:'badge-recu' }
      const badgeLbl = { envoye:'✓ Envoyé', brouillon:'📝 Brouillon', recu:'📥 Reçu' }
      list.innerHTML = emails.slice().reverse().map((e, i) => {
        const cls     = badgeCls[e.statut] || ''
        const lbl     = badgeLbl[e.statut] || e.statut
        const dateFmt = (e.date || '').slice(0, 10)
        const preview = (e.corps || '').replace(/\n/g,' ').slice(0, 50) + ((e.corps||'').length > 50 ? '…' : '')
        const who     = e.statut === 'recu'
          ? `De : ${esc(e.destinataire || '')}`
          : `À : ${esc(e.destinataire || '')}`
        return `
          <div class="email-item" id="eitem-${i}">
            <div class="email-item-row" onclick="toggleEmailItem(${i})">
              <span class="email-badge ${cls}">${lbl}</span>
              <span class="email-item-subj">${esc(e.sujet || '(sans sujet)')}</span>
              <span class="email-item-date">${dateFmt}</span>
            </div>
            <div class="email-item-preview">${esc(preview)}</div>
            <div class="email-item-body">${e.destinataire ? `<div style="font-size:11px;color:#888;margin-bottom:8px">${who}</div>` : ''}${esc(e.corps || '')}</div>
          </div>`
      }).join('')
    }

    function toggleEmailItem(i) {
      const el = document.getElementById('eitem-' + i)
      if (el) el.classList.toggle('open')
    }

    async function envoyerEmailCompose() {
      const dest   = (document.getElementById('compDest')?.value || '').trim()
      const sujet  = (document.getElementById('compSubj')?.value || '').trim()
      const corps  = (document.getElementById('compBody')?.value || '').trim()
      const status = document.getElementById('compStatus')
      const btn    = document.getElementById('btnSend')
      if (!dest) { status.textContent = '⚠️ Renseigne le destinataire'; status.style.color = '#b45309'; return }
      btn.disabled = true; btn.textContent = 'Envoi…'
      status.textContent = ''
      try {
        const res = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/emails/envoyer', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ destinataire: dest, sujet, corps })
        })
        const d = await res.json()
        if (d.succes) {
          status.textContent = '✅ Email envoyé !'
          status.style.color = '#166534'
          document.getElementById('compDest').value = ''
          document.getElementById('compSubj').value = ''
          document.getElementById('compBody').value = ''
          chargerEmails()
        } else {
          status.textContent = '❌ ' + (d.message || 'Erreur inconnue')
          status.style.color = '#b91c1c'
        }
      } catch(e) {
        status.textContent = '❌ Erreur réseau : ' + e.message
        status.style.color = '#b91c1c'
      }
      btn.disabled = false; btn.textContent = '📧 Envoyer'
    }

    async function sauvegarderBrouillon() {
      const dest  = (document.getElementById('compDest')?.value || '').trim()
      const sujet = (document.getElementById('compSubj')?.value || '').trim()
      const corps = (document.getElementById('compBody')?.value || '').trim()
      const status = document.getElementById('compStatus')
      try {
        const res = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/emails/brouillon', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ destinataire: dest, sujet, corps })
        })
        const d = await res.json()
        if (d.succes) {
          status.textContent = '💾 Brouillon sauvegardé'
          status.style.color = '#92400e'
          chargerEmails()
          setTimeout(() => { const s = document.getElementById('compStatus'); if(s) s.textContent = '' }, 3000)
        }
      } catch(e) {
        status.textContent = '❌ ' + e.message; status.style.color = '#b91c1c'
      }
    }

    async function redigerIA() {
      const bodyEl   = document.getElementById('compBody')
      const contexte = (bodyEl?.value || '').trim() ||
                       `Rédige un email professionnel pour le client du projet ${nomProjet}`
      const btn    = document.getElementById('btnIA')
      const status = document.getElementById('compStatus')
      btn.disabled = true; btn.textContent = '⏳ Génération…'
      status.textContent = ''
      try {
        const res = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/emails/rediger-ia', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ contexte })
        })
        const d = await res.json()
        if (d.erreur) throw new Error(d.erreur)
        if (d.sujet) document.getElementById('compSubj').value = d.sujet
        if (d.corps) document.getElementById('compBody').value = d.corps
        status.textContent = '🤖 Email rédigé — vérifiez avant d\'envoyer'
        status.style.color = '#1e40af'
      } catch(e) {
        status.textContent = '❌ ' + e.message; status.style.color = '#b91c1c'
      }
      btn.disabled = false; btn.textContent = '🤖 Rédiger avec l\'IA'
    }

    function ouvrirModalRecu() {
      const m = document.getElementById('modalRecu'); if (m) m.style.display = 'flex'
    }
    function fermerModalRecu() {
      const m = document.getElementById('modalRecu'); if (m) m.style.display = 'none'
    }

    async function sauvegarderRecu() {
      const expediteur = (document.getElementById('rcvFrom')?.value || '').trim()
      const sujet      = (document.getElementById('rcvSubj')?.value || '').trim()
      const corps      = (document.getElementById('rcvBody')?.value || '').trim()
      const date       = (document.getElementById('rcvDate')?.value || '').trim()
      const status     = document.getElementById('rcvStatus')
      try {
        const res = await fetch('/projet/' + encodeURIComponent(nomProjet) + '/emails/recu', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ expediteur, sujet, corps, date })
        })
        const d = await res.json()
        if (d.succes) {
          fermerModalRecu()
          chargerEmails()
          ;['rcvFrom','rcvSubj','rcvBody'].forEach(id => {
            const el = document.getElementById(id); if (el) el.value = ''
          })
        } else {
          status.textContent = '❌ Erreur lors de l\'ajout'; status.style.color = '#b91c1c'
        }
      } catch(e) {
        status.textContent = '❌ ' + e.message; status.style.color = '#b91c1c'
      }
    }

    charger()
  </script>
</body>
